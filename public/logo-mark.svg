<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lovable Stack Architect">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B2BE6"/>
      <stop offset="55%" stop-color="#6E3CF1"/>
      <stop offset="100%" stop-color="#A371FF"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#sheen)"/>

  <!-- Stacked architecture mark forming an implied "A" -->
  <g fill="#FFFFFF" filter="url(#soft)">
    <!-- Bottom slab (widest) -->
    <rect x="96" y="346" width="320" height="44" rx="22"/>
    <!-- Middle slab -->
    <rect x="138" y="270" width="236" height="44" rx="22" opacity="0.92"/>
    <!-- Upper slab -->
    <rect x="180" y="194" width="152" height="44" rx="22" opacity="0.84"/>
    <!-- Apex / spark -->
    <path d="M256 96 L274 150 L256 168 L238 150 Z" opacity="0.96"/>
    <circle cx="256" cy="132" r="6" opacity="0.9"/>
  </g>
</svg>
